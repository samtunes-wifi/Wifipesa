<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WifiPesa - Portal ya Internet</title>
    <style>
        :root {
            --primary-color: #00c853; 
            --dark-color: #121212;
            --card-color: #1e1e1e;
            --text-color: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--dark-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card-color);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            text-align: center;
            margin-top: 20px;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .welcome-msg {
            font-size: 14px;
            color: #b3b3b3;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: #aaa;
            margin-bottom: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--primary-color);
        }

        .packages-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .package-card {
            background: #252525;
            border: 2px solid #333;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .package-card:hover {
            border-color: #555;
        }

        .package-card.selected {
            border-color: var(--primary-color);
            background: rgba(0, 200, 83, 0.05);
        }

        .package-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .package-price {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .btn-pay {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-pay:hover {
            opacity: 0.9;
        }

        .status-msg {
            margin-top: 15px;
            font-size: 14px;
            font-weight: 500;
            display: none;
        }
        
        .loading { color: #ffb300; }
        .success { color: #00c853; }
        .error { color: #ff3d00; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">⚡ WifiPesa</div>
        <p class="welcome-msg" id="portal-message">Karibu! Lipa na upate internet ya haraka papo hapo.</p>

        <div class="input-group">
            <label for="phone">Namba ya Simu ya Malipo (M-Pesa/Airtel)</label>
            <input type="tel" id="phone" placeholder="Mfano: 0712345678" required>
        </div>

        <h3 style="text-align: left; margin-bottom: 10px; font-size: 14px; color: #aaa;">Chagua Kifurushi:</h3>
        <div class="packages-grid" id="packages-container">
            <p style="grid-column: span 2; color: #888;">Inavuta vifurushi...</p>
        </div>

        <button class="btn-pay" id="pay-button" onclick="startPaymentProcess()">ANZA KULIPIA</button>
        
        <div class="status-msg" id="status-display"></div>
    </div>

    <script>
        // ID ya siri ya majaribio inayotambulika na router bypass kwenye server.js
        const testPaymentId = "660000000000000000000001"; 
        const dummyClientId = "660000000000000000000001";
        let selectedPackageId = null;

        const API_BASE_URL = window.location.origin;
        const currentMacAddress = "11:22:33:44:55:66";

        // 1. Vuta Vifurushi pindi tu ukurasa unapofunguka
        async function fetchAvailablePackages() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/packages/portal/${dummyClientId}`);
                const data = await response.json();
                
                const container = document.getElementById('packages-container');
                container.innerHTML = ''; 

                if(!data.packages || data.packages.length === 0) {
                    container.innerHTML = '<p style="grid-column: span 2; color: #ff3d00;">Hakuna vifurushi.</p>';
                    return;
                }

                data.packages.forEach((pkg, index) => {
                    const card = document.createElement('div');
                    card.className = `package-card ${index === 0 ? 'selected' : ''}`;
                    if(index === 0) selectedPackageId = pkg._id; 

                    card.onclick = function() {
                        document.querySelectorAll('.package-card').forEach(c => c.classList.remove('selected'));
                        card.classList.add('selected');
                        selectedPackageId = pkg._id;
                    };

                    card.innerHTML = `
                        <div class="package-name">${pkg.name}</div>
                        <div class="package-price">${pkg.price} TZS</div>
                    `;
                    container.appendChild(card);
                });

            } catch (err) {
                console.error(err);
                document.getElementById('packages-container').innerHTML = '<p style="grid-column: span 2; color: #ff3d00;">Error ya server.</p>';
            }
        }

        // 2. MFUMO ULIOREKEBISHWA - Unaenda endpoint sahihi ya muamala!
        async function startPaymentProcess() {
            const phoneInput = document.getElementById('phone').value.trim();
            const statusDisplay = document.getElementById('status-display');
            const payButton = document.getElementById('pay-button');

            if (!phoneInput) {
                showStatus("Tafadhali ingiza namba ya simu!", "error");
                return;
            }

            try {
                payButton.disabled = true;
                showStatus("Inatuma ombi la malipo...", "loading");

                // Hatua ya 1: Inatengeneza muamala kwenye DB yako
                const initResponse = await fetch(`${API_BASE_URL}/api/payments/initiate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        clientId: dummyClientId,
                        packageId: selectedPackageId,
                        userPhone: phoneInput,
                        method: 'mpesa'
                    })
                });
                const initData = await initResponse.json();

                if (!initResponse.ok) throw new Error(initData.message);

                // Hatua ya 2: Uhakiki sahihi wa router kwa kutumia testPaymentId (66000...)
                showStatus("Inahakiki malipo na kuwasha internet...", "loading");
                
                // REKEBISHO LIKWENYE MSTARI HUU HAPA CHINI:
                const confirmResponse = await fetch(`${API_BASE_URL}/api/payments/confirm/${testPaymentId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        status: 'success',
                        transactionId: 'TXN-' + Math.floor(Math.random() * 999999),
                        macAddress: currentMacAddress
                    })
                });
                const confirmData = await confirmResponse.json();

                if (confirmResponse.ok) {
                    showStatus(`🎉 ${confirmData.message}`, "success");
                } else {
                    throw new Error(confirmData.message || "Imeshindwa");
                }

            } catch (err) {
                showStatus(`Hitilafu: ${err.message}`, "error");
            } finally {
                payButton.disabled = false;
            }
        }

        function showStatus(text, type) {
            const statusDisplay = document.getElementById('status-display');
            statusDisplay.style.display = "block";
            statusDisplay.className = `status-msg ${type}`;
            statusDisplay.innerText = text;
        }

        window.onload = fetchAvailablePackages;
    </script>
</body>
</html>
